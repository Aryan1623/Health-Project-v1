<div class="min-h-screen flex items-center justify-center bg-gray-900">

  <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">

    <h2 class="text-3xl font-bold text-white text-center mb-6">
      Welcome Back
    </h2>

    <!-- Email -->
    <input
      [(ngModel)]="user.email"
      placeholder="Email"
      class="w-full mb-4 p-3 rounded bg-gray-700 text-white outline-none"
    />

    <!-- Password -->
    <input
      [(ngModel)]="user.password"
      type="password"
      placeholder="Password"
      class="w-full mb-6 p-3 rounded bg-gray-700 text-white outline-none"
    />

    <!-- Login Button -->
    <button
      (click)="login()"
      class="w-full bg-green-600 hover:bg-green-700 transition p-3 rounded text-white font-semibold"
    >
      Login
    </button>

    <!-- Redirect -->
    <p class="text-gray-400 text-center mt-4">
      Don't have an account?
      <a routerLink="/signup" class="text-blue-400 hover:underline">
        Sign up
      </a>
    </p>

  </div>

</div>
