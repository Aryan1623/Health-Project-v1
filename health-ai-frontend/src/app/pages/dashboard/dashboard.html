<div class="min-h-screen bg-gray-900 text-white flex flex-col items-center justify-center p-6">

  <h1 class="text-4xl font-bold mb-8 text-center">
    🧠 Health AI Dashboard
  </h1>

  <!-- Card -->
  <div class="bg-gray-800 p-6 rounded-xl shadow-lg w-full max-w-md text-center">

    <h2 class="text-xl mb-4 font-semibold">
      Start Health Analysis
    </h2>

    <p class="text-gray-400 mb-6">
      This will guide you through face scan, eye scan, smartwatch data, and questionnaire.
    </p>

    <!-- 🔥 BUTTON -->
    <button
      (click)="startPipeline()"
      class="bg-blue-600 hover:bg-blue-700 transition px-6 py-3 rounded w-full text-lg font-semibold"
    >
      Run Health Analysis
    </button>

  </div>

</div>
