<div class="min-h-screen flex items-center justify-center bg-gray-900">

  <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">

    <h2 class="text-3xl font-bold text-white text-center mb-6">
      Create Account
    </h2>

    <!-- Name -->
    <input
      [(ngModel)]="user.name"
      placeholder="Full Name"
      class="w-full mb-4 p-3 rounded bg-gray-700 text-white outline-none"
    />

    <!-- Email -->
    <input
      [(ngModel)]="user.email"
      placeholder="Email"
      class="w-full mb-4 p-3 rounded bg-gray-700 text-white outline-none"
    />

    <!-- Password -->
    <input
      [(ngModel)]="user.password"
      type="password"
      placeholder="Password"
      class="w-full mb-6 p-3 rounded bg-gray-700 text-white outline-none"
    />

    <!-- Signup Button -->
    <button
      (click)="signup()"
      class="w-full bg-blue-600 hover:bg-blue-700 transition p-3 rounded text-white font-semibold"
    >
      Sign Up
    </button>

    <!-- Redirect -->
    <p class="text-gray-400 text-center mt-4">
      Already have an account?
      <a routerLink="/" class="text-blue-400 hover:underline">
        Login
      </a>
    </p>

  </div>

</div>
